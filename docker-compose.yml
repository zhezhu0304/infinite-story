services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/prisma
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "file:/app/prisma/prod.db"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
